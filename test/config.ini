# These environment variables are set by the build process and read by
# test/*/test_runner.py

[environment]
CLIENT_NAME=Bitcoin Core
CLIENT_BUGREPORT=https://github.com/bitcoin/bitcoin/issues
SRCDIR=/Users/etc/Projects/Target-Insight-Function/stdio-Bus/experimental_RnD/bitcoin
BUILDDIR=/Users/etc/Projects/Target-Insight-Function/stdio-Bus/experimental_RnD/bitcoin/build
EXEEXT=
RPCAUTH=/Users/etc/Projects/Target-Insight-Function/stdio-Bus/experimental_RnD/bitcoin/share/rpcauth/rpcauth.py

[components]
# Which components are enabled. These are commented out by cmake if they were disabled during configuration.
#ENABLE_WALLET=true
#BUILD_BENCH=true
ENABLE_CLI=true
BUILD_BITCOIN_TX=true
ENABLE_BITCOIN_UTIL=true
#ENABLE_BITCOIN_CHAINSTATE=true
#ENABLE_WALLET_TOOL=true
ENABLE_BITCOIND=true
#ENABLE_FUZZ_BINARY=true
#ENABLE_ZMQ=true
ENABLE_EMBEDDED_ASMAP=true
ENABLE_EXTERNAL_SIGNER=true
#ENABLE_USDT_TRACEPOINTS=true
#ENABLE_IPC=true
